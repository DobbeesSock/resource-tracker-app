<!DOCTYPE html>
<html>
<head>
  <title>Resource Tracker</title>

  <style>
    body {
    background: url("https://tse3.mm.bing.net/th/id/OIP.ar83qfSeXYWj44vPuMmJggHaEJ?rs=1&pid=ImgDetMain&o=7&rm=3") no-repeat center center fixed;
    background-size: cover;
    color: white;
    font-family: Arial, sans-serif;
    margin: 20px;
    }

    body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.65);
    z-index: -1;
    }

    button {
      background: #333;
      color: white;
      border: 1px solid #555;
      padding: 6px 10px;
      margin: 2px;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #555;
    }

    select {
      background: #333;
      color: white;
      border: 1px solid #555;
      padding: 5px;
    }

    #app {
    max-width: 700px;
    margin: auto;
    background: rgba(30, 30, 30, 0.85);
    padding: 15px;
    border-radius: 10px;
    backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>

<div style="margin-bottom:10px;">
  <select id="profileSelect" onchange="loadProfile()"></select>
  <button onclick="newProfile()">New Profile</button>
  <button onclick="saveProfile()">Save</button>
  <button onclick="resetResources()">Reset</button>
</div>

<div id="app"></div>

<script>
const defaultResources = [
  { name: "Food", value: 0, color: "#4CAF50", icon: "🍖" },
  { name: "Gold", value: 0, color: "#D4AF37", icon: "🪙" },
  { name: "Energy", value: 10, max: 10, color: "#2196F3", icon: "⚡" },
  { name: "Metal", value: 0, color: "#9E9E9E", icon: "⛓️" },
  { name: "Dragon Coins", value: 0, color: "#FF5722", icon: "🐉" },
  { name: "Shadow Marks", value: 0, color: "#9C27B0", icon: "🌑" }
];

let resources = [];
let currentProfile = "";

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  resources.forEach((res, i) => {
    const row = document.createElement("div");
    row.style.margin = "10px";
    row.style.padding = "10px";
    row.style.border = "1px solid #ccc";
    row.style.borderLeft = `6px solid ${res.color}`;
    row.style.display = "flex";
    row.style.justifyContent = "space-between";
    row.style.alignItems = "center";
    row.style.borderRadius = "8px";
    row.style.background = "rgba(50, 50, 50, 0.85)";
    row.style.boxShadow = "0 0 8px rgba(0,0,0,0.5)";

    const displayValue = res.max !== undefined 
      ? `${res.value} / ${res.max}` 
      : res.value;

    row.innerHTML = `
      <div style="width:150px;">
  <strong>${res.icon} ${res.name}</strong>
</div>
 <div style="font-size:24px; font-weight:bold; min-width:100px; text-align:center;">
  ${displayValue}
 </div>
    <button onclick="change(${i}, 1)">+1</button>
    <button onclick="change(${i}, 5)">+5</button>
    <button onclick="change(${i}, -1)">-1</button>
    <button onclick="change(${i}, -5)">-5</button>

    ${res.name === "Energy" ? `
      <button onclick="increaseMaxEnergy(1)">Max +1</button>
      <button onclick="increaseMaxEnergy(5)">Max +5</button>
      <button onclick="increaseMaxEnergy(-1)">Max -1</button>
  ` : ""}
</div>
    `;

    app.appendChild(row);
  });
}

function change(index, amount) {
  const res = resources[index];
  res.value += amount;

  // Handle Energy cap
  if (res.max !== undefined) {
    if (res.value > res.max) res.value = res.max;
  }

  // Prevent negative values
  if (res.value < 0) res.value = 0;

  saveProfile();
  render();
}

function resetResources() {
  resources = JSON.parse(JSON.stringify(defaultResources));
  saveProfile();
  render();
}

function saveProfile() {
  if (!currentProfile) return;
  localStorage.setItem("profile_" + currentProfile, JSON.stringify(resources));
  updateProfileList();
}

function loadProfile() {
  const select = document.getElementById("profileSelect");
  currentProfile = select.value;

  const data = localStorage.getItem("profile_" + currentProfile);
  if (data) {
    resources = JSON.parse(data);
  } else {
    resources = JSON.parse(JSON.stringify(defaultResources));
  }

  render();
}

function newProfile() {
  const name = prompt("Enter profile name:");
  if (!name) return;

  currentProfile = name;
  resources = JSON.parse(JSON.stringify(defaultResources));
  saveProfile();
  updateProfileList();
  render();
}

function updateProfileList() {
  const select = document.getElementById("profileSelect");
  select.innerHTML = "";

  Object.keys(localStorage).forEach(key => {
    if (key.startsWith("profile_")) {
      const name = key.replace("profile_", "");
      const option = document.createElement("option");
      option.value = name;
      option.textContent = name;
      if (name === currentProfile) option.selected = true;
      select.appendChild(option);
    }
  });
}

function increaseMaxEnergy(amount) {
  const energy = resources.find(r => r.name === "Energy");
  if (!energy) return;

  energy.max += amount;

  // Prevent max from going below 1
  if (energy.max < 1) energy.max = 1;

  // Clamp current value if it exceeds new max
  if (energy.value > energy.max) {
    energy.value = energy.max;
  }

  saveProfile();
  render();
}

// INIT
updateProfileList();

if (document.getElementById("profileSelect").options.length > 0) {
  loadProfile();
} else {
  newProfile();
}
</script>
